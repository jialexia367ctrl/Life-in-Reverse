# ============================================================
# Supabase Configuration for 反向人生交易所
# ============================================================

[project]
id = "your-project-id"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

# Enable anonymous sign-ins
[auth.anonymous]
enabled = true

[functions]
enabled = true

# Edge Functions configuration
[functions.get-stories]
verify_jwt = false

[functions.publish-story]
verify_jwt = true

[functions.create-payment-intent]
verify_jwt = true

[functions.handle-payment-webhook]
verify_jwt = false

[functions.send-comfort]
verify_jwt = true

[functions.get-user-center]
verify_jwt = true

[functions.get-tragedy-rank]
verify_jwt = false
